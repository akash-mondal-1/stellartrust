name: StellarTrust CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Install Dependencies
      run: npm install --prefix apps/web

    - name: Build Web App
      run: npm run build --prefix apps/web
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
        NEXT_TELEMETRY_DISABLED: 1
        # Skip runtime env validation during CI build
        SKIP_ENV_VALIDATION: true

  test-contracts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: wasm32-unknown-unknown

    - name: Cargo Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          contracts/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml', 'contracts/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Rust Compilation
      run: cargo check --manifest-path contracts/Cargo.toml
      working-directory: ${{ github.workspace }}

    - name: Run Contract Tests
      run: cargo test --manifest-path contracts/Cargo.toml -- --test-threads=1
      working-directory: ${{ github.workspace }}
